name:  ai_review

on: [push]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write 
      contents: read
    name: AI Reviewer
    steps:
      
      - name: PR Agent Action
        uses: Codium-ai/pr-agent@main
        env:
          MODEL_PROVIDER: "google" 
          MODEL: "gemini-1.5-flash" 
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
        