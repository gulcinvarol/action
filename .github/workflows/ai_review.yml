name:  ai_review

on: [push]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write 
      contents: read
    name: AI Reviewer
    steps:
      
      - name: PR Agent Action
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        