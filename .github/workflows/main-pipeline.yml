---
name: "Hibrit Pipeline"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write 
  statuses: write

jobs:
  # ==========================================
  # 1.AŞAMA
  # ==========================================
  gitleaks:
    name: "Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  linter:
    name: "Kod Standartları ve Kalite(Linting)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Super-Linter Slim
        uses: github/super-linter/slim@v5
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  # ==========================================
  # 2.AŞAMA
  # ==========================================
  unit-test:
    name: "Unit Test"
    needs: [gitleaks, linter]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest  
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Tests
        run: pytest 

  # ==========================================
  # 3.AŞAMA
  # ==========================================
  bandit:
    name: "Statik Güvenlik Analizi(SAST-Bandit)"
    needs: [unit-test] 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bandit Scan
        run: pip install bandit && bandit -r .

  snyk:
    name: "Bağımlılık Güvenlik Analizi(SCA - Snyk)"
    needs: [unit-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master 
      - name: Snyk Test
        run: snyk test --file=requirements.txt 
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  trivy:
    name: "Altyapı ve Zafiyet Taraması(Trivy)"
    needs: [unit-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'

  # ==========================================
  # 4.AŞAMA
  # ==========================================
  codeql:
    name: "Derin Kod Güvenlik Analizi (CodeQL)"
    needs: [bandit, snyk, trivy] 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'python'
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  sonarcloud:
    name: "Kod Kalite Analizi(SonarCloud)"
    needs: [bandit, snyk, trivy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=gulcinvarol_action
            -Dsonar.organization=gulcinvarol

  ai-review:
    name: "AI Code Review"
    needs: [sonarcloud, codeql]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Code Diff
        run: git diff origin/main...HEAD > /tmp/diff.txt || true

      - name: AI Code Review
        run: |
          DIFF=$(cat /tmp/diff.txt)
          if [ -z "$DIFF" ]; then
            echo "No code changes found"
            exit 0
          fi
          
          # Create JSON payload with diff using jq
          PAYLOAD=$(jq -n --rawfile diff /tmp/diff.txt '{
            contents: [{
              parts: [{
                text: ("You are an expert code reviewer. Review this PR code changes:\n\n" + $diff)
              }]
            }]
          }')
          
          echo "DEBUG: API Key length: ${#GEMINI_API_KEY}"
          
          # Send to Gemini API
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          
          echo "=========================================="
          echo "DEBUG RESPONSE:"
          echo "$RESPONSE"
          echo "=========================================="
          echo "🤖 GEMINI AI CODE REVIEW"
          echo "=========================================="
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // .error // "Review failed"'
          echo "=========================================="



          