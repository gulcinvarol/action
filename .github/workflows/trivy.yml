name: Trivy Security Scan

on:
  push:
    branches: [ "main" ]
  

jobs:
  trivy_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs' 
          ignore-unfixed: true 
          format: 'table' 
          exit-code: '0' 
          severity: 'CRITICAL,HIGH' 