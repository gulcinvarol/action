---
name: "Pipeline 2 - Derin ve Detaylı Analiz"

on:
  pull_request:
    branches: ["main"]
    types: [ready_for_review]

permissions:
  contents: read
  security-events: write
  statuses: write
  pull-requests: write

concurrency:
  group: pipeline-2-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # ==========================================
  # 1.AŞAMA
  # ==========================================
  snyk:
    name: "Bağımlılık Güvenlik Analizi (SCA - Snyk)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
      - name: Snyk Test
        run: snyk test --file=requirements.txt
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ==========================================
  # 2.AŞAMA
  # ==========================================
  codeql:
    name: "Derin Kod Güvenlik Analizi (CodeQL)"
    needs: [snyk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'python'
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ==========================================
  # 3.AŞAMA
  # ==========================================
  sonarcloud:
    name: "Kod Kalite Analizi (SonarCloud)"
    needs: [codeql]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=gulcinvarol_action
            -Dsonar.organization=gulcinvarol

  # ==========================================
  # 4.AŞAMA
  # ==========================================
  code-review:
    name: "Code Review (Reviewdog)"
    needs: [sonarcloud]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Reviewdog
        run: |
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Pylint with Reviewdog
        run: |
          pylint --output-format=parseable app.py test_app.py | reviewdog -name="pylint" -reporter=github-pr-review -efm='%f:%l:%c: %m' || true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Flake8 with Reviewdog
        uses: reviewdog/action-flake8@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: error