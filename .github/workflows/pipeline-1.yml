---
name: "Pipeline 1 - Hızlı ve Kolay Tarama"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  security-events: write
  statuses: write
  pull-requests: write

concurrency:
  group: pipeline-1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # 1.AŞAMA
  # ==========================================
  gitleaks:
    name: "Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 2.AŞAMA
  # ==========================================
  linter:
    name: "Kod Standartları ve Kalite (Linting)"
    needs: [gitleaks]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Super-Linter Slim
        uses: github/super-linter/slim@v5
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 3.AŞAMA
  # ==========================================
  unit-test:
    name: "Unit Test"
    needs: [linter]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Tests
        run: pytest

  # ==========================================
  # 4.AŞAMA
  # ==========================================
  bandit:
    name: "Statik Güvenlik Analizi (SAST - Bandit)"
    needs: [unit-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bandit Scan
        run: pip install bandit && bandit -r .

  # ==========================================
  # 5.AŞAMA
  # ==========================================
  trivy:
    name: "Altyapı ve Zafiyet Taraması (Trivy)"
    needs: [bandit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'