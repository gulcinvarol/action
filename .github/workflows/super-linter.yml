name: Super-Linter

on: [push, pull_request]

jobs:
  build:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Super-Linter
        uses: github/super-linter@v5
        env:
          FILTER_REGEX_EXCLUDE: .*test_.* 
          VALIDATE_PYTHON_BLACK: false
          