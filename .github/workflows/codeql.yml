name:  codeQL guvenlik analizi

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  analyze:
    name: Guvenlik Analizi
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # analiz sonuclari

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'python' 

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3